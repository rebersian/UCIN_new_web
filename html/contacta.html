<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="contact.page.title"></title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

  <div id="header"></div>

  <!-- HERO -->
  <section class="hero">
    <div class="container">
      <h2 data-i18n="contact.hero.title"></h2>
      <p data-i18n="contact.hero.subtitle"></p>
    </div>
  </section>

  <!-- CONTACT FORM -->
  <section class="section">
    <div class="container">

      <form class="contact-form" action="mailto:rebersian@gmail.com" method="post" enctype="text/plain">

        <label for="name" data-i18n="contact.form.name"></label>
        <input type="text" id="name" name="name" required>

        <label for="email" data-i18n="contact.form.email"></label>
        <input type="email" id="email" name="email" required>

        <label for="subject" data-i18n="contact.form.subject"></label>
        <input type="text" id="subject" name="subject" required>

        <label for="message" data-i18n="contact.form.message"></label>
        <textarea id="message" name="message" rows="6" required></textarea>

        <button type="submit" class="btn primary" data-i18n="contact.form.button"></button>

      </form>

    </div>
  </section>

  <div id="footer"></div>
  <script src="../js/include.js"></script>
  <script src="../js/i18n.js"></script>
</body>
</html>
