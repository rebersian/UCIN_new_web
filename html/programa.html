<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="program.title"></title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

  <div id="header"></div>

  <!-- HERO -->
  <section class="hero">
    <div class="container">
      <h2 data-i18n="program.hero.title"></h2>
      <p data-i18n="program.hero.subtitle"></p>
    </div>
  </section>

  <!-- EJES -->
  <section class="section">
    <div class="container">
      <h2 data-i18n="program.sections.title"></h2>

      <div class="cards">

        <div class="card">
          <h3 data-i18n="program.urbanism.title"></h3>
          <p data-i18n="program.urbanism.text"></p>
        </div>

        <div class="card">
          <h3 data-i18n="program.environment.title"></h3>
          <p data-i18n="program.environment.text"></p>
        </div>

        <div class="card">
          <h3 data-i18n="program.social.title"></h3>
          <p data-i18n="program.social.text"></p>
        </div>

      </div>
    </div>
  </section>

  <!-- MEDIDAS -->
  <section class="section light">
    <div class="container">
      <h2 data-i18n="program.measures.title"></h2>

      <div class="cards">

        <div class="card">
          <h3 data-i18n="program.measures.infrastructure.title"></h3>
          <p data-i18n="program.measures.infrastructure.text"></p>
        </div>

        <div class="card">
          <h3 data-i18n="program.measures.sustainability.title"></h3>
          <p data-i18n="program.measures.sustainability.text"></p>
        </div>

        <div class="card">
          <h3 data-i18n="program.measures.participation.title"></h3>
          <p data-i18n="program.measures.participation.text"></p>
        </div>

        <div class="card">
          <h3 data-i18n="program.measures.education.title"></h3>
          <p data-i18n="program.measures.education.text"></p>
        </div>

      </div>
    </div>
  </section>

  <div id="footer"></div>

  <script src="../js/include.js"></script>
  <script src="../js/i18n.js"></script>

</body>
</html>
