<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="site.title">UCIN Mediona</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

  <div id="header"></div>

  <!-- HERO -->
  <section class="hero">
    <div class="container">
      <h2 data-i18n="index.hero.title"></h2>
      <p data-i18n="index.hero.subtitle"></p>
      <div class="buttons">
        <a href="#" class="btn primary" data-i18n="index.hero.btn.about"></a>
        <a href="#" class="btn secondary" data-i18n="index.hero.btn.proposals"></a>
      </div>
    </div>
  </section>

  <!-- PROPOSTES -->
  <section class="section">
    <div class="container">
      <h2 data-i18n="index.proposals.title"></h2>
      <div class="cards">

        <div class="card">
          <h3 data-i18n="index.proposals.urbanism.title"></h3>
          <p data-i18n="index.proposals.urbanism.text"></p>
        </div>

        <div class="card">
          <h3 data-i18n="index.proposals.environment.title"></h3>
          <p data-i18n="index.proposals.environment.text"></p>
        </div>

        <div class="card">
          <h3 data-i18n="index.proposals.social.title"></h3>
          <p data-i18n="index.proposals.social.text"></p>
        </div>

      </div>
    </div>
  </section>

  <!-- NOTICIAS -->
  <section class="section light">
    <div class="container">
      <h2 data-i18n="index.news.title"></h2>
      <div class="cards">

        <div class="card">
          <h3 data-i18n="index.news.item1.title"></h3>
          <p data-i18n="index.news.item1.text"></p>
        </div>

        <div class="card">
          <h3 data-i18n="index.news.item2.title"></h3>
          <p data-i18n="index.news.item2.text"></p>
        </div>

      </div>
    </div>
  </section>

  <!-- CTA -->
  <section class="cta">
    <div class="container">
      <h2 data-i18n="index.cta.title"></h2>
      <p data-i18n="index.cta.text"></p>
      <a href="#" class="btn primary" data-i18n="index.cta.button"></a>
    </div>
  </section>

  <div id="footer"></div>
  <script src="../js/include.js"></script>
  <script src="../js/i18n.js"></script>
</body>
</html>
